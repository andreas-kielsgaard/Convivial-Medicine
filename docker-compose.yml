services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: convivial_medicine
      POSTGRES_USER: convivial
      POSTGRES_PASSWORD: convivial
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convivial -d convivial_medicine"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-local-minio-access}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-local-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
